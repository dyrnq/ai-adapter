name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ai-adapter

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: ubuntu-24.04
            target: armv7-unknown-linux-musleabihf
            cross: true
          # macOS
          - os: macos-14
            target: x86_64-apple-darwin
            cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            cross: false
          # Windows
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            cross: false
          - os: windows-2022
            target: x86_64-pc-windows-gnu
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install NASM (windows-msvc)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ilammy/setup-nasm@v1

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "name=${{ env.BINARY_NAME }}.exe" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.BINARY_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Rename artifact
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }} \
             ${{ env.BINARY_NAME }}-${TAG}-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-*
          if-no-files-found: error

  docker:
    name: Docker multi-arch
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download musl artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "x86_64-unknown-linux-musl|aarch64-unknown-linux-musl"
          path: artifacts
          merge-multiple: false

      - name: Organize binaries for multi-arch build
        shell: bash
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f
          echo "=== end ==="
          mkdir -p bin/amd64 bin/arm64
          # Use while read + basename like hostab does
          find artifacts/x86_64-unknown-linux-musl -type f | while read f; do
            cp "$f" bin/amd64/ai-adapter
          done
          find artifacts/aarch64-unknown-linux-musl -type f | while read f; do
            cp "$f" bin/arm64/ai-adapter
          done
          chmod +x bin/amd64/ai-adapter bin/arm64/ai-adapter
          echo "Staged amd64 and arm64 binaries"
          ls -la bin/amd64/ bin/arm64/ 

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push (static)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.static
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: false

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          # Copy only binary artifacts, exclude docker metadata
          find artifacts -type f -not -name '*.dockerbuild' -not -name '*.json' -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > sha256sums.txt

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "## Changelog" > changelog.md
            echo "" >> changelog.md
            git log --oneline --no-decorate -30 >> changelog.md
          else
            echo "## Changes since $PREV_TAG" > changelog.md
            echo "" >> changelog.md
            git log --oneline --no-decorate ${PREV_TAG}..HEAD >> changelog.md
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing release (if any)
        id: delete_release
        shell: bash
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}"             -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"             "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(curl -s               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"               "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"               | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            curl -s -X DELETE               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"               "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted release $RELEASE_ID for ${{ github.ref_name }}"
          else
            echo "No existing release for ${{ github.ref_name }}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ### Assets
            | Platform | File |
            |---|---|
            | Linux x86_64 (gnu) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu` |
            | Linux x86_64 (musl) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-musl` |
            | Linux aarch64 (musl) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-aarch64-unknown-linux-musl` |
            | Linux aarch64 (gnu) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-aarch64-unknown-linux-gnu` |
            | Linux armv7 (musl) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-armv7-unknown-linux-musleabihf` |
            | macOS x86_64 | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-apple-darwin` |
            | macOS aarch64 | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-aarch64-apple-darwin` |
            | Windows x86_64 (msvc) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe` |
            | Windows x86_64 (gnu) | `${{ env.BINARY_NAME }}-${{ github.ref_name }}-x86_64-pc-windows-gnu.exe` |

            ### Docker
            ```
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}:${{ github.ref_name }}
            ```

            ${{ steps.changelog.outputs.changelog }}
          files: release-assets/*
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
